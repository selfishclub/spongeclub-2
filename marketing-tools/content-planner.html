<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ContentDeck — 마케팅 콘텐츠 캘린더 &amp; 플래너</title>
<meta name="description" content="마케터를 위한 콘텐츠 캘린더. 플랫폼별 콘텐츠 일정을 짜고, 상태를 추적하고, 팀과 공유하세요." />
<style>
  :root {
    --bg:#0a0a0a; --fg:#fff; --muted:#a1a1a1; --accent:#d6ff3f; --accent-fg:#0a0a0a;
    --border:#2a2a2a; --card:#141414; --card2:#1c1c1c;
    --mono:"SF Mono","JetBrains Mono","Fira Code",ui-monospace,Menlo,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard",system-ui,sans-serif;
    /* 상태 색상 */
    --s-idea:#7c7c7c; --s-draft:#ffbd2e; --s-scheduled:#3fa9ff; --s-done:#d6ff3f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--fg); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  ::selection { background:var(--accent); color:var(--accent-fg); }
  button { font-family:inherit; cursor:pointer; }
  input, select, textarea { font-family:inherit; }

  .wrap { max-width:1200px; margin:0 auto; padding:0 24px; }

  /* ---- 헤더 ---- */
  header { border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(10,10,10,.9); backdrop-filter:blur(10px); z-index:40; }
  .top { display:flex; align-items:center; justify-content:space-between; height:70px; gap:16px; flex-wrap:wrap; }
  .logo { font-family:var(--mono); font-weight:800; font-size:19px; letter-spacing:-.5px; }
  .logo span { color:var(--accent); }
  .top-actions { display:flex; gap:10px; flex-wrap:wrap; }

  .btn { display:inline-flex; align-items:center; gap:7px; font-weight:700; font-size:14px; padding:10px 16px; border:2px solid var(--border); background:transparent; color:var(--fg); transition:transform .1s ease, background .1s ease, color .1s ease; }
  .btn:hover { background:var(--card2); }
  .btn-primary { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
  .btn-primary:hover { background:var(--accent); transform:translate(-2px,-2px); box-shadow:4px 4px 0 var(--fg); }
  .btn-sm { padding:7px 12px; font-size:13px; }

  /* ---- 툴바 ---- */
  .toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 0; flex-wrap:wrap; }
  .month-nav { display:flex; align-items:center; gap:12px; }
  .month-nav h1 { font-size:26px; letter-spacing:-1px; font-weight:800; min-width:180px; }
  .nav-btn { width:38px; height:38px; display:flex; align-items:center; justify-content:center; border:2px solid var(--border); background:transparent; color:var(--fg); font-size:16px; }
  .nav-btn:hover { background:var(--card2); }
  .view-toggle { display:flex; border:2px solid var(--border); }
  .view-toggle button { padding:8px 16px; background:transparent; color:var(--muted); font-weight:700; font-size:13px; border:none; }
  .view-toggle button.active { background:var(--accent); color:var(--accent-fg); }

  /* ---- 필터/범례 ---- */
  .legend { display:flex; gap:18px; flex-wrap:wrap; padding:0 0 20px; align-items:center; }
  .legend .chip { display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); font-family:var(--mono); cursor:pointer; user-select:none; padding:4px 6px; border:1px solid transparent; }
  .legend .chip .sw { width:11px; height:11px; border-radius:50%; }
  .legend .chip.off { opacity:.35; }
  .legend .chip:hover { border-color:var(--border); }

  /* ---- 통계 ---- */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .stat { border:1px solid var(--border); padding:16px 18px; }
  .stat .num { font-size:30px; font-weight:800; font-family:var(--mono); letter-spacing:-1px; }
  .stat .lbl { color:var(--muted); font-size:12px; font-family:var(--mono); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  @media (max-width:720px){ .stats{ grid-template-columns:repeat(2,1fr);} }

  /* ---- 캘린더 ---- */
  .cal-head { display:grid; grid-template-columns:repeat(7,1fr); border:1px solid var(--border); border-bottom:none; }
  .cal-head div { padding:10px; font-family:var(--mono); font-size:12px; color:var(--muted); text-align:center; text-transform:uppercase; letter-spacing:1px; }
  .cal-head div:first-child { color:#ff5f56; }
  .cal { display:grid; grid-template-columns:repeat(7,1fr); border:1px solid var(--border); }
  .cell { min-height:118px; border:1px solid var(--border); margin:-.5px; padding:6px; display:flex; flex-direction:column; gap:4px; cursor:pointer; transition:background .1s; }
  .cell:hover { background:var(--card); }
  .cell.out { background:#0d0d0d; opacity:.5; }
  .cell .date { font-family:var(--mono); font-size:12px; color:var(--muted); align-self:flex-end; }
  .cell.today .date { background:var(--accent); color:var(--accent-fg); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .event { font-size:11px; padding:3px 6px; border-left:3px solid var(--muted); background:var(--card2); border-radius:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.3; }
  .event .plt { color:var(--muted); font-family:var(--mono); font-size:9px; }
  .cell .more { font-size:10px; color:var(--muted); font-family:var(--mono); }

  /* ---- 리스트 뷰 ---- */
  .list { border:1px solid var(--border); }
  .list-row { display:grid; grid-template-columns:110px 1fr 130px 110px 40px; gap:12px; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; }
  .list-row:hover { background:var(--card); }
  .list-row:last-child { border-bottom:none; }
  .list-row .d { font-family:var(--mono); font-size:13px; color:var(--muted); }
  .list-row .t { font-weight:600; font-size:15px; }
  .list-row .status-tag { font-size:11px; font-family:var(--mono); padding:3px 8px; border-radius:99px; display:inline-block; text-align:center; }
  .list-row .plt-tag { font-size:12px; color:var(--muted); font-family:var(--mono); }
  .list-empty { padding:60px 20px; text-align:center; color:var(--muted); }
  @media (max-width:720px){ .list-row{ grid-template-columns:1fr; gap:6px; } .list-row .d{order:-1;} }

  /* ---- 모달 ---- */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg); border:2px solid var(--accent); width:100%; max-width:480px; padding:28px; max-height:90vh; overflow:auto; }
  .modal h2 { font-size:22px; letter-spacing:-.5px; margin-bottom:20px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-family:var(--mono); font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
  .field input, .field select, .field textarea { width:100%; background:var(--card); border:1px solid var(--border); color:var(--fg); padding:11px 13px; font-size:15px; outline:none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }
  .field textarea { resize:vertical; min-height:70px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:10px; margin-top:24px; }
  .modal-actions .btn { flex:1; justify-content:center; }
  .btn-danger { border-color:#ff5f56; color:#ff5f56; }
  .btn-danger:hover { background:#ff5f56; color:#fff; }

  footer { border-top:1px solid var(--border); margin-top:60px; padding:28px 0; }
  .foot { display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; align-items:center; }
  .foot .note { color:#555; font-size:12px; font-family:var(--mono); }
  .hidden { display:none !important; }
</style>
</head>
<body>

<header>
  <div class="wrap top">
    <div class="logo">content<span>deck</span>_</div>
    <div class="top-actions">
      <button class="btn btn-sm" id="btnImport">↧ 불러오기</button>
      <button class="btn btn-sm" id="btnExport">↥ 내보내기</button>
      <button class="btn btn-primary btn-sm" id="btnAdd">+ 콘텐츠 추가</button>
      <input type="file" id="fileInput" accept="application/json" class="hidden" />
    </div>
  </div>
</header>

<div class="wrap">
  <!-- 툴바 -->
  <div class="toolbar">
    <div class="month-nav">
      <button class="nav-btn" id="prevM">‹</button>
      <h1 id="monthLabel">—</h1>
      <button class="nav-btn" id="nextM">›</button>
      <button class="btn btn-sm" id="todayBtn">오늘</button>
    </div>
    <div class="view-toggle">
      <button id="viewCal" class="active">캘린더</button>
      <button id="viewList">리스트</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats" id="stats"></div>

  <!-- 범례(=상태 필터) -->
  <div class="legend" id="legend"></div>

  <!-- 캘린더 뷰 -->
  <div id="calView">
    <div class="cal-head">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal" id="cal"></div>
  </div>

  <!-- 리스트 뷰 -->
  <div id="listView" class="hidden">
    <div class="list" id="list"></div>
  </div>
</div>

<footer>
  <div class="wrap foot">
    <div class="logo" style="font-size:16px;">content<span style="color:var(--accent)">deck</span>_</div>
    <div class="note">데이터는 이 브라우저에만 저장돼요 · 팀 공유는 "내보내기 → 파일 전달 → 불러오기" · 스폰지클럽 2기</div>
  </div>
</footer>

<!-- 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">콘텐츠 추가</h2>
    <input type="hidden" id="f-id" />
    <div class="field">
      <label>제목</label>
      <input type="text" id="f-title" placeholder="예: 신제품 런칭 인스타 릴스" />
    </div>
    <div class="row2">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label>플랫폼</label>
        <select id="f-platform"></select>
      </div>
    </div>
    <div class="field">
      <label>상태</label>
      <select id="f-status"></select>
    </div>
    <div class="field">
      <label>메모</label>
      <textarea id="f-notes" placeholder="카피, 링크, 담당자 등 자유롭게"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete">삭제</button>
      <button class="btn" id="btnCancel">취소</button>
      <button class="btn btn-primary" id="btnSave">저장</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "contentdeck.v1";

  var PLATFORMS = ["인스타그램","X(트위터)","스레드","블로그","유튜브","뉴스레터","틱톡","페이스북","기타"];
  var STATUSES = [
    { key:"idea",      label:"아이디어", color:"var(--s-idea)" },
    { key:"draft",     label:"작성중",   color:"var(--s-draft)" },
    { key:"scheduled", label:"예약됨",   color:"var(--s-scheduled)" },
    { key:"done",      label:"발행됨",   color:"var(--s-done)" }
  ];

  // ---- 상태 ----
  var items = load();
  var view = new Date();            // 현재 보고 있는 달
  view.setDate(1);
  var mode = "cal";                 // "cal" | "list"
  var hiddenStatuses = {};          // 상태 필터 off 집합

  // ---- DOM ----
  var $ = function(id){ return document.getElementById(id); };
  var cal = $("cal"), list = $("list"), stats = $("stats"), legend = $("legend");
  var overlay = $("overlay");

  // ---- 유틸 ----
  function load(){
    try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : seed(); }
    catch(e){ return []; }
  }
  function save(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e){} }
  function uid(){ return "id-" + Math.random().toString(36).slice(2,9) + "-" + items.length; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
  function pad(n){ return (n<10?"0":"")+n; }
  function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function statusOf(k){ for(var i=0;i<STATUSES.length;i++){ if(STATUSES[i].key===k) return STATUSES[i]; } return STATUSES[0]; }

  // 처음 열었을 때 감 잡으라고 넣는 예시 데이터
  function seed(){
    var t = new Date(); t.setHours(0,0,0,0);
    function rel(days){ var d=new Date(t); d.setDate(d.getDate()+days); return ymd(d); }
    return [
      { id:"seed-1", title:"신제품 런칭 인스타 릴스", platform:"인스타그램", status:"scheduled", date:rel(1),  notes:"15초 훅 강조, 자막 필수" },
      { id:"seed-2", title:"주간 뉴스레터 #12",        platform:"뉴스레터",   status:"draft",     date:rel(2),  notes:"제목 A/B 테스트" },
      { id:"seed-3", title:"블로그: 사용 후기 인터뷰",  platform:"블로그",     status:"idea",      date:rel(5),  notes:"고객 2명 섭외 필요" },
      { id:"seed-4", title:"프로모션 결과 회고 스레드", platform:"스레드",     status:"idea",      date:rel(7),  notes:"" },
      { id:"seed-5", title:"이벤트 안내 카드뉴스",       platform:"인스타그램", status:"done",      date:rel(-2), notes:"참여율 4.2%" }
    ];
  }

  // ---- 렌더 ----
  function render(){
    renderMonthLabel();
    renderStats();
    renderLegend();
    if(mode==="cal"){ $("calView").classList.remove("hidden"); $("listView").classList.add("hidden"); renderCal(); }
    else { $("calView").classList.add("hidden"); $("listView").classList.remove("hidden"); renderList(); }
  }

  function visible(){
    return items.filter(function(it){ return !hiddenStatuses[it.status]; });
  }

  function renderMonthLabel(){
    $("monthLabel").textContent = view.getFullYear() + "년 " + (view.getMonth()+1) + "월";
  }

  function renderStats(){
    var y = view.getFullYear(), m = view.getMonth();
    var monthItems = items.filter(function(it){
      var d = new Date(it.date+"T00:00:00");
      return d.getFullYear()===y && d.getMonth()===m;
    });
    var by = { idea:0, draft:0, scheduled:0, done:0 };
    monthItems.forEach(function(it){ if(by[it.status]!=null) by[it.status]++; });
    var cards = [
      { num: monthItems.length, lbl:"이번 달 콘텐츠" },
      { num: by.scheduled,      lbl:"예약됨" },
      { num: by.draft + by.idea,lbl:"작업 필요" },
      { num: by.done,           lbl:"발행 완료" }
    ];
    stats.innerHTML = cards.map(function(c){
      return '<div class="stat"><div class="num">'+c.num+'</div><div class="lbl">'+c.lbl+'</div></div>';
    }).join("");
  }

  function renderLegend(){
    legend.innerHTML = STATUSES.map(function(s){
      var off = hiddenStatuses[s.key] ? " off" : "";
      return '<span class="chip'+off+'" data-status="'+s.key+'">'+
             '<span class="sw" style="background:'+s.color+'"></span>'+s.label+'</span>';
    }).join("") + '<span style="color:#555;font-size:12px;font-family:var(--mono);margin-left:auto;">↑ 눌러서 필터</span>';

    Array.prototype.forEach.call(legend.querySelectorAll(".chip"), function(chip){
      chip.addEventListener("click", function(){
        var k = chip.getAttribute("data-status");
        hiddenStatuses[k] = !hiddenStatuses[k];
        render();
      });
    });
  }

  function renderCal(){
    var y = view.getFullYear(), m = view.getMonth();
    var first = new Date(y, m, 1);
    var startDow = first.getDay();               // 0=일
    var start = new Date(y, m, 1 - startDow);     // 그리드 시작(이전달 포함)
    var todayStr = ymd(new Date());

    // 날짜별 그룹
    var byDate = {};
    visible().forEach(function(it){ (byDate[it.date] = byDate[it.date] || []).push(it); });

    var html = "";
    for(var i=0;i<42;i++){
      var d = new Date(start); d.setDate(start.getDate()+i);
      var ds = ymd(d);
      var out = d.getMonth()!==m ? " out" : "";
      var today = ds===todayStr ? " today" : "";
      var dayItems = byDate[ds] || [];
      var events = dayItems.slice(0,3).map(function(it){
        var s = statusOf(it.status);
        return '<div class="event" data-id="'+it.id+'" style="border-left-color:'+s.color+'" title="'+esc(it.title)+'">'+
               '<span class="plt">'+esc(it.platform)+'</span> '+esc(it.title)+'</div>';
      }).join("");
      var more = dayItems.length>3 ? '<div class="more">+'+(dayItems.length-3)+' 더보기</div>' : "";
      html += '<div class="cell'+out+today+'" data-date="'+ds+'">'+
                '<span class="date">'+d.getDate()+'</span>'+events+more+
              '</div>';
    }
    cal.innerHTML = html;

    Array.prototype.forEach.call(cal.querySelectorAll(".cell"), function(cell){
      cell.addEventListener("click", function(e){
        var ev = e.target.closest(".event");
        if(ev){ e.stopPropagation(); openModal(ev.getAttribute("data-id")); }
        else { openModal(null, cell.getAttribute("data-date")); }
      });
    });
  }

  function renderList(){
    var y = view.getFullYear(), m = view.getMonth();
    var rows = visible().filter(function(it){
      var d = new Date(it.date+"T00:00:00");
      return d.getFullYear()===y && d.getMonth()===m;
    }).sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

    if(rows.length===0){
      list.innerHTML = '<div class="list-empty">이번 달에 등록된 콘텐츠가 없어요.<br>상단의 <b>+ 콘텐츠 추가</b> 로 시작해보세요.</div>';
      return;
    }
    list.innerHTML = rows.map(function(it){
      var s = statusOf(it.status);
      var d = new Date(it.date+"T00:00:00");
      var dstr = (d.getMonth()+1)+"/"+d.getDate()+" ("+["일","월","화","수","목","금","토"][d.getDay()]+")";
      return '<div class="list-row" data-id="'+it.id+'">'+
        '<div class="d">'+dstr+'</div>'+
        '<div class="t">'+esc(it.title)+'</div>'+
        '<div class="plt-tag">'+esc(it.platform)+'</div>'+
        '<div><span class="status-tag" style="background:'+s.color+';color:#0a0a0a;">'+s.label+'</span></div>'+
        '<div style="text-align:right;color:var(--muted);">›</div>'+
      '</div>';
    }).join("");

    Array.prototype.forEach.call(list.querySelectorAll(".list-row"), function(r){
      r.addEventListener("click", function(){ openModal(r.getAttribute("data-id")); });
    });
  }

  // ---- 모달 ----
  function fillSelects(){
    $("f-platform").innerHTML = PLATFORMS.map(function(p){ return '<option>'+p+'</option>'; }).join("");
    $("f-status").innerHTML = STATUSES.map(function(s){ return '<option value="'+s.key+'">'+s.label+'</option>'; }).join("");
  }

  function openModal(id, presetDate){
    var editing = null;
    if(id){ for(var i=0;i<items.length;i++){ if(items[i].id===id){ editing = items[i]; break; } } }
    $("modalTitle").textContent = editing ? "콘텐츠 수정" : "콘텐츠 추가";
    $("btnDelete").style.display = editing ? "" : "none";
    $("f-id").value = editing ? editing.id : "";
    $("f-title").value = editing ? editing.title : "";
    $("f-date").value = editing ? editing.date : (presetDate || ymd(new Date()));
    $("f-platform").value = editing ? editing.platform : PLATFORMS[0];
    $("f-status").value = editing ? editing.status : "idea";
    $("f-notes").value = editing ? (editing.notes||"") : "";
    overlay.classList.add("open");
    setTimeout(function(){ $("f-title").focus(); }, 30);
  }
  function closeModal(){ overlay.classList.remove("open"); }

  function saveModal(){
    var title = $("f-title").value.trim();
    if(!title){ $("f-title").focus(); $("f-title").style.borderColor = "#ff5f56"; return; }
    var id = $("f-id").value;
    var data = {
      title: title,
      date: $("f-date").value || ymd(new Date()),
      platform: $("f-platform").value,
      status: $("f-status").value,
      notes: $("f-notes").value.trim()
    };
    if(id){
      for(var i=0;i<items.length;i++){ if(items[i].id===id){ items[i] = Object.assign(items[i], data); break; } }
    } else {
      data.id = uid();
      items.push(data);
    }
    save(); closeModal(); render();
  }

  function deleteItem(){
    var id = $("f-id").value;
    if(!id) return;
    if(!confirm("이 콘텐츠를 삭제할까요?")) return;
    items = items.filter(function(it){ return it.id!==id; });
    save(); closeModal(); render();
  }

  // ---- 내보내기 / 불러오기 ----
  function exportJSON(){
    var blob = new Blob([JSON.stringify(items, null, 2)], { type:"application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "contentdeck-" + ymd(new Date()) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function importJSON(file){
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw new Error("형식 오류");
        var clean = data.filter(function(it){ return it && it.title && it.date; }).map(function(it){
          return { id: it.id || uid(), title:String(it.title), date:String(it.date),
                   platform: it.platform || "기타", status: statusOf(it.status).key, notes: it.notes || "" };
        });
        if(clean.length===0) throw new Error("불러올 항목이 없어요");
        var merge = confirm("기존 데이터에 합칠까요?\n\n[확인] = 기존에 추가\n[취소] = 전체 교체");
        items = merge ? items.concat(clean) : clean;
        save(); render();
        alert(clean.length + "개 콘텐츠를 불러왔어요.");
      } catch(e){ alert("불러오기 실패: 올바른 ContentDeck JSON 파일이 아니에요."); }
    };
    reader.readAsText(file);
  }

  // ---- 이벤트 바인딩 ----
  $("prevM").addEventListener("click", function(){ view.setMonth(view.getMonth()-1); render(); });
  $("nextM").addEventListener("click", function(){ view.setMonth(view.getMonth()+1); render(); });
  $("todayBtn").addEventListener("click", function(){ view = new Date(); view.setDate(1); render(); });
  $("viewCal").addEventListener("click", function(){ mode="cal"; $("viewCal").classList.add("active"); $("viewList").classList.remove("active"); render(); });
  $("viewList").addEventListener("click", function(){ mode="list"; $("viewList").classList.add("active"); $("viewCal").classList.remove("active"); render(); });
  $("btnAdd").addEventListener("click", function(){ openModal(null); });
  $("btnSave").addEventListener("click", saveModal);
  $("btnCancel").addEventListener("click", closeModal);
  $("btnDelete").addEventListener("click", deleteItem);
  $("btnExport").addEventListener("click", exportJSON);
  $("btnImport").addEventListener("click", function(){ $("fileInput").click(); });
  $("fileInput").addEventListener("change", function(e){ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; });
  overlay.addEventListener("click", function(e){ if(e.target===overlay) closeModal(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });
  $("f-title").addEventListener("input", function(){ $("f-title").style.borderColor=""; });

  // ---- 시작 ----
  fillSelects();
  render();
})();
</script>
</body>
</html>
