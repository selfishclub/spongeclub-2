<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 48 32" width="34" height="23">
          <defs>
            <radialGradient id="spgG" cx="38%" cy="32%" r="75%">
              <stop offset="0%" stop-color="#FFE27A" />
              <stop offset="60%" stop-color="#FFC400" />
              <stop offset="100%" stop-color="#F2A900" />
            </radialGradient>
          </defs>
          <path d="M9 5.5C3.6 6.6 1 11 2.2 16.5 3 20.7 1.2 22.8 4 26c3 3.4 8.6 2.6 12.2.7 2.7-1.4 5.6-1.4 8.4-.2 4.4 1.9 11 2.6 14.6-1.4 3.2-3.5 1.6-6.2 2.3-10.2C54.6 9 50 4.6 43.8 5 39.7 5.2 36.6 3 32 2.6 25.6 2 22.4 5 18 5.4 14.8 5.7 12.4 4.8 9 5.5Z" fill="url(#spgG)" stroke="#E09600" stroke-width="1.2"/>
          <g fill="#A66E00" opacity="0.5">
            <circle cx="13" cy="13" r="2.1"/><circle cx="22" cy="20" r="1.6"/>
            <circle cx="30" cy="12" r="2.4"/><circle cx="38" cy="19" r="1.5"/>
            <circle cx="18" cy="9" r="1.2"/><circle cx="42" cy="12" r="1.3"/>
            <circle cx="9" cy="20" r="1.4"/><circle cx="27" cy="25" r="1.1"/>
          </g>
        </svg>
      </div>
      <div class="titles">
        <h1>스폰지 타이머</h1>
        <span class="badge">SPONGE CLUB</span>
      </div>
    </header>

    <div class="modes" role="tablist">
      <button class="mode is-on" data-mode="timer" type="button">타이머</button>
      <button class="mode" data-mode="stopwatch" type="button">스톱워치</button>
    </div>

    <div class="preview" id="preview">05:00</div>

    <div id="timer-config">
      <section class="presets" aria-label="빠른 시간 설정">
        <button class="chip" data-sec="60">1분</button>
        <button class="chip" data-sec="180">3분</button>
        <button class="chip is-on" data-sec="300">5분</button>
        <button class="chip" data-sec="420">7분</button>
        <button class="chip" data-sec="600">10분</button>
      </section>

      <section class="presets second" aria-label="일상 프리셋">
        <button class="chip soft" data-sec="1500">뽀모도로 25분</button>
        <button class="chip soft" data-sec="300">휴식 5분</button>
      </section>

      <section class="manual" aria-label="직접 입력">
        <div class="field">
          <input id="min" type="number" min="0" max="180" inputmode="numeric" value="5" />
          <label for="min">분</label>
        </div>
        <span class="colon">:</span>
        <div class="field">
          <input id="sec" type="number" min="0" max="59" inputmode="numeric" value="0" />
          <label for="sec">초</label>
        </div>
      </section>
    </div>

    <p id="sw-note" class="sw-note" hidden>0초부터 <b>경과 시간</b>을 잽니다. 공부·요리·운동 등 “얼마나 걸리나” 잴 때 쓰세요.</p>

    <button id="launch" class="launch">타이머 띄우기 ▶</button>

    <p class="hint" id="hint">떠 있는 타이머의 <b>▶</b> 로 시작! 팝업 없이 <b id="hk">단축키</b>로도 띄울 수 있어요.</p>
    <p class="err" id="err" hidden></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
