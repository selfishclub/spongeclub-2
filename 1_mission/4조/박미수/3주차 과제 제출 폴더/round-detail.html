<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>라운드 상세 — Golf Rank</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    main { padding: 18px 20px 24px; }
    .meta-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 18px; box-shadow: var(--shadow-card); }
    .meta-card .m-course { font-size: 18px; font-weight: 700; }
    .meta-card .m-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .list-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .rank-list { display: flex; flex-direction: column; gap: 10px; }
    .rank-row { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; box-shadow: var(--shadow-card); }
    .rr-top { display: flex; align-items: center; gap: 12px; }
    .rank-num { flex: 0 0 38px; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 24px; color: var(--muted); }
    .rank-row.top1 { border-color: var(--gold); background: #FFFBF0; }
    .rank-row.top1 .rank-num { color: var(--gold); }
    .rank-medal { font-size: 20px; }
    .rr-main { flex: 1; min-width: 0; }
    .rr-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .rr-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .rr-score { text-align: right; }
    .rr-score .big { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 24px; }
    .rr-score .unit { font-size: 12px; color: var(--muted); font-weight: 600; }
    .rr-score .diff { font-size: 12px; font-weight: 600; margin-top: 2px; }
    .diff.under { color: var(--green); } .diff.over { color: #E53935; } .diff.even { color: var(--muted); }
    .holes-toggle { margin-top: 10px; font-size: 12px; font-weight: 600; color: var(--green); cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
    .holes-wrap { margin-top: 10px; overflow-x: auto; }
    .holes-grid { display: grid; grid-auto-flow: column; grid-auto-columns: 34px; gap: 4px; min-width: max-content; }
    .hcell { text-align: center; }
    .hcell .hn { font-size: 10px; color: var(--muted); font-family: 'Montserrat', sans-serif; }
    .hcell .hs { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; padding: 4px 0; border: 1px solid var(--border); border-radius: 6px; background: #fff; margin-top: 2px; }
    .hcell .hs.under { color: var(--green); border-color: var(--green-light); } .hcell .hs.over { color: #E53935; }
    .hcell.gap { margin-left: 8px; }
    .rd-media { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .rd-media .rdm { width: 96px; height: 96px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111; position: relative; }
    .rd-media .rdm img, .rd-media .rdm video { width: 100%; height: 100%; object-fit: cover; }
    .rd-media .rdm .vt { position: absolute; bottom: 4px; left: 4px; font-size: 10px; background: rgba(0,0,0,0.55); color: #fff; padding: 1px 5px; border-radius: 4px; }
    /* 댓글 */
    .cmt-box { margin-top: 24px; }
    .cmt-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .cmt-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
    .cmt-empty { font-size: 13px; color: var(--muted); padding: 8px 0; }
    .cmt-item .cmt-head { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .cmt-item .cmt-head b { color: var(--text); font-size: 13px; }
    .cmt-item .cmt-head .cmt-del { color: #C0392B; cursor: pointer; margin-left: auto; }
    .cmt-item .cmt-body { font-size: 14px; color: var(--text); line-height: 1.5; margin-top: 3px; white-space: pre-wrap; }
    .cmt-form { display: flex; gap: 8px; }
    .cmt-form input { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; font-size: 14px; font-family: inherit; }
    .cmt-form input:focus { outline: none; border-color: var(--green); }
    .cmt-form button { border: none; background: var(--green); color: #fff; border-radius: 10px; padding: 0 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" aria-label="뒤로"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="title" id="clubTitle">라운드 상세<span class="sub" id="clubSub"></span></div>
      <button class="icon-btn" id="editBtn" aria-label="수정"><svg viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </header>
    <main id="main"></main>
    <div class="toast" id="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./db.js"></script>
  <script src="./media.js"></script>
  <script>
    const STORAGE_KEY='golfrank.clubs';
    const $=(id)=>document.getElementById(id);
    const params=new URLSearchParams(location.search);
    const clubId=params.get('club'), roundId=params.get('round');
    let clubs=load(); let club=clubs.find((c)=>c.id===clubId);
    let round=club && (club.rounds||[]).find((r)=>r.id===roundId);
    const SS_PAR=[4,5,3,4,4,4,3,5,4];
    function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }catch(e){ return []; } }
    function esc(s){ return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDate(str){ const d=new Date(str); return (d.getMonth()+1)+'월 '+d.getDate()+'일'; }
    function badge(role){ return role==='owner'?'<span class="role-emoji" title="모임장">👑</span>':role==='staff'?'<span class="role-emoji" title="운영진">⭐</span>':role==='guest'?'<span class="badge guest">게스트</span>':''; }
    let tt; function showToast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2000); }

    if(club) $('clubTitle').childNodes[0].nodeValue=club.name;

    function render(){
      if(!round){ $('main').innerHTML='<div class="empty"><div class="icon">🤔</div><h3>라운드를 찾을 수 없어요</h3></div>'; return; }
      const scores=round.scores.filter((s)=>typeof s.total==='number').slice().sort((a,b)=>a.total-b.total);
      const medals=['🥇','🥈','🥉'];
      const rows=scores.map((s,i)=>{
        const cls=i===0?'top1':''; const num=i<3?`<span class="rank-medal">${medals[i]}</span>`:(i+1);
        const diff=s.total-round.par; const dc=diff<0?'under':diff>0?'over':'even'; const ds=diff===0?'E':(diff>0?'+'+diff:diff);
        let holes='';
        if(s.holes&&s.holes.length===18){
          holes=holeGrid(s.holes.map((v,k)=>({n:k+1,val:v,par:null})),true);
        } else if(s.holesRel&&s.holesRel.some((x)=>x!=null)){
          holes=holeGrid(s.holesRel.map((v,k)=>({n:k+1,val:v,par:SS_PAR[k],rel:true})),false);
        }
        const toggle = holes ? `<button class="holes-toggle" data-h="${i}">홀별 보기 ▾</button><div class="holes-wrap" id="hw-${i}" hidden>${holes}</div>` : '';
        const extra = (s.front!=null||s.back!=null) ? `전반 ${s.front??'–'} · 후반 ${s.back??'–'}` : '';
        return `<div class="rank-row ${cls}">
          <div class="rr-top">
            <div class="rank-num">${num}</div>
            <div class="rr-main"><div class="rr-name">${esc(s.name)} ${badge(s.role)}</div>${extra?`<div class="rr-meta">${extra}</div>`:''}</div>
            <div class="rr-score"><div><span class="big">${s.total}</span><span class="unit">타</span></div><div class="diff ${dc}">${ds}</div></div>
          </div>${toggle}
        </div>`;
      }).join('');
      const mediaBox = (round.media&&round.media.length) ? '<div class="rd-media" id="rdMedia"></div>' : '';
      $('main').innerHTML=`
        <div class="meta-card"><div class="m-course">⛳ ${esc(round.course)}</div><div class="m-sub">${fmtDate(round.date)} · Par ${round.par} · ${round.scores.length}명 · ${round.source==='ocr'?'사진 인식':round.source==='total'?'총 스코어':'직접 입력'}</div></div>
        ${mediaBox}
        <div class="list-title">🏆 라운드 순위</div><div class="rank-list">${rows}</div>
        <div class="cmt-box" id="comments"></div>`;
      loadDetailMedia();
      loadComments();
      $('main').querySelectorAll('[data-h]').forEach((b)=>b.addEventListener('click',()=>{ const w=$('hw-'+b.dataset.h); w.hidden=!w.hidden; b.textContent = w.hidden?'홀별 보기 ▾':'홀별 접기 ▴'; }));
    }
    function holeGrid(cells,abs){
      const inner=cells.map((c,k)=>{
        let cls='',disp=c.val;
        if(c.rel){ const n=parseInt(c.val,10); cls=isNaN(n)?'':n<0?'under':n>0?'over':''; disp=isNaN(n)?'–':(n>0?'+'+n:n); }
        else { const n=parseInt(c.val,10); /* abs: color vs par unknown here */ disp=isNaN(n)?'–':n; }
        return `<div class="hcell ${k===9?'gap':''}"><div class="hn">${c.n}</div><div class="hs ${cls}">${disp}</div></div>`;
      }).join('');
      return `<div class="holes-grid">${inner}</div>`;
    }

    async function loadDetailMedia(){
      const box=$('rdMedia'); if(!box || !round.media) return;
      for(const ref of round.media){
        const blob=await mediaGet(ref.id); if(!blob) continue;
        const url=URL.createObjectURL(blob);
        const el=document.createElement('div'); el.className='rdm';
        el.innerHTML = ref.type==='video' ? `<video src="${url}" muted loop playsinline autoplay preload="metadata"></video><span class="vt">▶ 영상</span>` : `<img src="${url}" alt="" />`;
        box.appendChild(el);
      }
    }
    /* ── 댓글 (Supabase) ── */
    async function loadComments(){
      const box=$('comments'); if(!box) return;
      const list = await fetchComments(clubId, 'round', roundId);
      const items = list.length
        ? list.map((c)=>`<div class="cmt-item"><div class="cmt-head"><b>${esc(c.author||'익명')}</b><span>${timeAgo(c.created_at)}</span><span class="cmt-del" data-del="${c.id}">삭제</span></div><div class="cmt-body">${esc(c.body)}</div></div>`).join('')
        : '<div class="cmt-empty">첫 댓글을 남겨보세요! 💬</div>';
      box.innerHTML = `<div class="cmt-title">💬 댓글 ${list.length?('('+list.length+')'):''}</div><div class="cmt-list">${items}</div>
        <div class="cmt-form"><input id="cmtInput" placeholder="댓글 달기…" maxlength="300" /><button id="cmtPost">등록</button></div>`;
      $('cmtPost').addEventListener('click', postCmt);
      $('cmtInput').addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); postCmt(); } });
      box.querySelectorAll('[data-del]').forEach((el)=> el.addEventListener('click', async ()=>{ if(!confirm('댓글을 삭제할까요?')) return; await deleteComment(el.dataset.del); loadComments(); }));
    }
    async function postCmt(){
      const v=($('cmtInput').value||'').trim(); if(!v){ showToast('내용을 입력하세요'); return; }
      const name=ensureMyName(); if(!name){ showToast('이름을 입력해야 등록돼요'); return; }
      try{ await upsertClub(club); await postComment(clubId,'round',roundId,name,v); loadComments(); }
      catch(e){ showToast('등록 실패: '+(e.message||e)); }
    }

    $('backBtn').addEventListener('click',()=>{ location.href='home.html?club='+encodeURIComponent(clubId); });
    $('editBtn').addEventListener('click',()=>{ if(round) location.href='round.html?club='+encodeURIComponent(clubId)+'&round='+encodeURIComponent(roundId); });
    render();
    (async ()=>{ const p=await pullClubIntoLocal(clubId); if(p){ club=p; round=(club.rounds||[]).find((r)=>r.id===roundId); render(); } })();
  </script>
</body>
</html>
