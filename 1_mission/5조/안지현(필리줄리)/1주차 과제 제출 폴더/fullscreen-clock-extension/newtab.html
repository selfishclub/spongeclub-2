<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julie Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 스폰지 거품 레이어 -->
  <div class="bubbles" id="bubbles" aria-hidden="true"></div>

  <main id="app">
    <!-- 상단 바: 브랜드 + 언어토글 -->
    <header class="topbar">
      <div class="brand">
        <span class="chip">SPONGE CLUB</span>
        <span class="gen">2기</span>
        <span class="by">Philly Julie</span>
      </div>
      <button class="lang-btn" id="langBtn" title="Language">EN</button>
    </header>

    <!-- 모드 전환 탭 -->
    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-mode="clock" data-i18n="clock">시계</button>
      <button class="tab" data-mode="world" data-i18n="world">세계시간</button>
      <button class="tab" data-mode="timer" data-i18n="timer">타이머</button>
      <button class="tab" data-mode="stopwatch" data-i18n="stopwatch">스톱워치</button>
    </nav>

    <!-- 시계 -->
    <section class="view is-active" data-view="clock">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">—</div>
    </section>

    <!-- 세계시간 -->
    <section class="view" data-view="world">
      <ul class="world-list" id="worldList"></ul>
      <button class="ghost-btn" id="addZoneBtn" data-i18n="addCity">+ 도시 추가</button>
    </section>

    <!-- 타이머 -->
    <section class="view" data-view="timer">
      <div class="big-display" id="timerDisplay">00:00</div>
      <div class="timer-setup" id="timerSetup">
        <input type="number" id="inMin" min="0" max="999" data-i18n-ph="min" placeholder="분" />
        <span class="colon">:</span>
        <input type="number" id="inSec" min="0" max="59" data-i18n-ph="sec" placeholder="초" />
      </div>
      <div class="presets" id="timerPresets">
        <button data-sec="60">1</button>
        <button data-sec="180">3</button>
        <button data-sec="300">5</button>
        <button data-sec="600">10</button>
        <button data-sec="1500">25</button>
      </div>
      <div class="controls">
        <button class="primary" id="timerStart" data-i18n="start">시작</button>
        <button id="timerReset" data-i18n="reset">초기화</button>
      </div>
    </section>

    <!-- 스톱워치 -->
    <section class="view" data-view="stopwatch">
      <div class="big-display" id="swDisplay">00:00.00</div>
      <div class="controls">
        <button class="primary" id="swStart" data-i18n="start">시작</button>
        <button id="swLap" data-i18n="lap">랩</button>
        <button id="swReset" data-i18n="reset">초기화</button>
      </div>
      <ul class="lap-list" id="lapList"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
